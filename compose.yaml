services:
  szurubooru-tools:
    image: ghcr.io/shaktoth/szurubooru-tools-web:latest
    container_name: szurubooru-tools
    restart: unless-stopped
    ports:
      - ${HOST_PORT:-10000}:${APP_PORT:-10000}
    environment:
      TZ: ${TZ:-Europe/Berlin}
      PORT: ${APP_PORT:-10000}
      DATA_DIR: /data
      DOWNLOAD_DIR: /data/downloads
      # Optional: set here or save later in the web UI.
      # SZURU_BASE_URL: "http://your-szurubooru-host:5200"
      # SZURU_USER: "Importer"
      # SZURU_TOKEN: "token"
      # E621_USER: "e621-user"
      # E621_API_KEY: "api-key"
    volumes:
      - szurubooru-tools-data:/data
volumes:
  szurubooru-tools-data: null
networks: {}
